  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #b69754;

    --dark: #111111;

  }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: #d8ce9f;
    color: #fff;
    overflow: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
  }

  /* ── RADIAL GLOW ── */
  .glow {
    position: fixed;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(182,151,84,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: breathe 6s ease-in-out infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
    50%       { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }

  /* ── LINES DECO ── */
  .lines {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }
  .lines::before, .lines::after {
    content: '';
    position: absolute;
    border: 1px solid rgba(182,151,84,0.07);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .lines::before { width: 600px; height: 600px; }
  .lines::after  { width: 900px; height: 900px; }

  /* ── MAIN LAYOUT ── */
  .wrap {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  /* ── LOGO ── */
  .logo{
    margin-bottom: 10px; /* réduit l'espace sous le logo */
    text-align: center;
}

.logo img{
    width: 200px;      /* logo plus discret */
    height: auto;
    display: block;
    margin: 0 auto;
}

  /* ── HEADLINE ── */
  .headline {
    animation: fadeUp .9s .15s ease both;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--gold); font-weight: 300; margin-bottom: 28px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; width: 30px; height: 1px; background: var(--gold); opacity: 0.5;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 9vw, 110px);
    font-weight: 300; line-height: 0.95;
    letter-spacing: -1px;
    color:#0d2262;

  .sub-head {

  /* ── COUNTDOWN ── */
  .countdown {
    display: flex; gap: 32px; justify-content: center;
    margin-bottom: 56px;
    animation: fadeUp .9s .3s ease both;
  }
  .cd-block { text-align: center; }
  .cd-num {

    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700; color: var(--gold);
    display: block; line-height: 1;

  }
  .cd-label {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-top: 6px; display: block;
  }
  .cd-sep {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; color: rgba(182,151,84,0.3);
    align-self: flex-start; padding-top: 8px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    width: min(420px, 90vw);
    margin-bottom: 56px;
    animation: fadeUp .9s .45s ease both;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 10px;
  }
  .progress-label span:last-child { color: var(--gold); }
  .progress-track {
    height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px;
    position: relative; overflow: visible;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    position: relative;
    animation: fillBar 2s 1s ease both;
  }
  .progress-fill::after {
    content: '';
    position: absolute; right: -4px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold-light);
    box-shadow: 0 0 12px rgba(212,184,120,0.8);
  }
  @keyframes fillBar { from { width: 0 } to { width: 68% } }

  /* ── NOTIFY FORM ── */
  .notify {
    display: flex; gap: 0;
    width: min(400px, 90vw);
    animation: fadeUp .9s .6s ease both;
    margin-bottom: 64px;
  }
  .notify input {
    flex: 1; padding: 14px 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-right: none;
    border-radius: 2px 0 0 2px;
    color: #fff; font-family: 'Jost', sans-serif;
    font-size: 13px; outline: none;
    transition: border-color .3s;
  }
  .notify input::placeholder { color: rgba(255,255,255,0.25); }
  .notify input:focus { border-color: rgba(182,151,84,0.4); }
  .notify button {
    padding: 14px 22px;
    background: var(--gold); color: #111;
    border: none; cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
    border-radius: 0 2px 2px 0;
    transition: background .3s;
    white-space: nowrap;
  }
  .notify button:hover { background: var(--gold-light); }
  .notify-confirm {
    display: none; color: var(--gold); font-size: 13px;
    align-items: center; gap: 8px; justify-content: center;
    height: 50px;
  }
  .notify-confirm.show { display: flex; animation: fadeUp .4s ease both; }

  /* ── SOCIALS ── */
  .socials {
    display: flex; gap: 14px; justify-content: center;

  .soc-btn {
    width: 40px; height: 40px;
    border: 1px solid #0d2262;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color:#0d2262; text-decoration: none;
    font-size: 14px;
    transition: all .3s;
  }
  .soc-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-3px); }

  /* ── CORNER DECO ── */
  .corner {
    position: fixed;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.15); font-family: 'Jost', sans-serif;
  }
  .corner-tl { top: 32px; left: 40px; }
  .corner-tr { top: 32px; right: 40px; text-align: right; }
  .corner-bl { bottom: 32px; left: 40px; }
  .corner-br { bottom: 32px; right: 40px; text-align: right; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .countdown { gap: 16px; }
    .cd-sep { font-size: 32px; }
    .corner { display: none; }
  }

<script>
  // ── COUNTDOWN vers une date cible ──
  const target = new Date();
  target.setDate(target.getDate() + 5); // 45 jours à partir d'aujourd'hui

  function tick() {
    const now  = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('days').textContent  = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('mins').textContent  = '00';
      document.getElementById('secs').textContent  = '00';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    document.getElementById('days').textContent  = String(d).padStart(2,'0');
    document.getElementById('hours').textContent = String(h).padStart(2,'0');
    document.getElementById('mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('secs').textContent  = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  // ── NOTIFY ──
  function submitNotify() {
    const val = document.getElementById('emailInput').value.trim();
    if (!val || !val.includes('@')) return;
    document.getElementById('notifyForm').style.display = 'none';
    document.getElementById('notifyConfirm').classList.add('show');
  }
</script>
